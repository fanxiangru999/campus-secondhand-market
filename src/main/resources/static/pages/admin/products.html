<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品管理 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">管理员后台</div>
            <ul class="navbar-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="users.html">用户管理</a></li>
                <li><a href="products.html">物品管理</a></li>
                <li><a href="trades.html">交易管理</a></li>
                <li><a href="statistics.html">统计分析</a></li>
            </ul>
            <div class="navbar-user">
                <span id="username">管理员</span>
                <button class="btn btn-small btn-warning" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 class="card-header">物品管理</h3>
            <div class="toolbar">
                <div class="search-box">
                    <select class="form-select" id="categoryFilter" style="width: 150px;">
                        <option value="">全部分类</option>
                    </select>
                    <select class="form-select" id="statusFilter" style="width: 150px;">
                        <option value="">全部状态</option>
                        <option value="待交易">待交易</option>
                        <option value="已下架">已下架</option>
                        <option value="已售出">已售出</option>
                    </select>
                    <input type="text" class="form-control" id="nameFilter" placeholder="搜索物品名称" style="width: 200px;">
                    <button class="btn btn-primary" onclick="searchProducts()">搜索</button>
                    <button class="btn btn-info" onclick="resetSearch()">重置</button>
                </div>
            </div>
            <div id="productList"></div>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        checkLogin();

        let allProducts = [];
        let displayedProducts = []; // 当前显示的产品列表

        async function initPage() {
            if (!isAdmin()) {
                showError('无权限访问');
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }

            const userInfo = getUserInfo();
            document.getElementById('username').textContent = userInfo.username;

            // 初始化分类选项
            const categoryFilter = document.getElementById('categoryFilter');
            categoryFilter.innerHTML = '<option value="">全部分类</option>' + generateCategoryOptions();

            // 添加事件监听器（只添加一次）
            if (!productActionListenerAdded) {
                document.getElementById('productList').addEventListener('click', handleProductAction);
                productActionListenerAdded = true;
            }

            await loadProducts();
        }

        async function loadProducts() {
            try {
                const response = await api.product.getAll();
                if (response.code === 200) {
                    allProducts = response.data;
                    displayProducts(allProducts);
                } else {
                    showError(response.message || '加载失败');
                }
            } catch (error) {
                console.error('Load products error:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        function displayProducts(products) {
            displayedProducts = products; // 保存当前显示的产品列表

            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>物品编号</th>
                            <th>物品名称</th>
                            <th>分类</th>
                            <th>成色</th>
                            <th>价格</th>
                            <th>发布者</th>
                            <th>发布时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.length === 0 ? '<tr><td colspan="9" style="text-align: center;">暂无物品</td></tr>' : ''}
                        ${products.map((product, index) => `
                            <tr>
                                <td>${product.productId}</td>
                                <td>${product.productName}</td>
                                <td>${product.category}</td>
                                <td><span class="tag ${getConditionClass(product.condition)}">${product.condition}</span></td>
                                <td class="${product.price >= 500 ? 'price-high' : ''}">${formatPrice(product.price)}</td>
                                <td>${product.sellerUsername}(${product.sellerStudentId})</td>
                                <td>${formatDate(product.publishDate)}</td>
                                <td><span class="tag ${getStatusClass(product.status)}">${product.status}</span></td>
                                <td>
                                    ${product.status === '待交易' ? `<button class="btn btn-small btn-danger" data-action="force-offline" data-id="${product.productId}">强制下架</button>` : '-'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('productList').innerHTML = html;
        }

        // 只添加一次事件监听器
        let productActionListenerAdded = false;

        function handleProductAction(e) {
            const target = e.target;
            if (!target.matches('button[data-action]')) {
                return;
            }

            const action = target.dataset.action;

            if (action === 'force-offline') {
                const productId = target.dataset.id;
                forceOffline(productId);
            }
        }

        function searchProducts() {
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;
            const keyword = document.getElementById('nameFilter').value.toLowerCase();

            let filtered = allProducts;

            if (category) {
                filtered = filtered.filter(p => p.category === category);
            }
            if (status) {
                filtered = filtered.filter(p => p.status === status);
            }
            if (keyword) {
                filtered = filtered.filter(p => p.productName.toLowerCase().includes(keyword));
            }

            displayProducts(filtered);
        }

        function resetSearch() {
            document.getElementById('categoryFilter').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('nameFilter').value = '';
            displayProducts(allProducts);
        }

        async function forceOffline(productId) {
            if (!confirm('确定要强制下架该物品吗？')) {
                return;
            }

            try {
                const response = await api.product.forceOffline(productId);
                if (response.code === 200) {
                    showSuccess('下架成功！');
                    await loadProducts();
                } else {
                    showError(response.message || '下架失败');
                }
            } catch (error) {
                console.error('Force offline error:', error);
                showError('下架失败，请检查网络连接');
            }
        }

        initPage();
    </script>
</body>
</html>
