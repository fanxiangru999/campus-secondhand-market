<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的发布 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">校园二手市场</div>
            <ul class="navbar-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="my-products.html">我的发布</a></li>
                <li><a href="my-trades.html">我的交易</a></li>
                <li><a href="profile.html">个人中心</a></li>
            </ul>
            <div class="navbar-user">
                <span id="username">加载中...</span>
                <button class="btn btn-small btn-warning" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 class="card-header">我的发布</h3>
            <div class="toolbar">
                <button class="btn btn-success" onclick="showPublishModal()">发布新物品</button>
            </div>
            <div id="productList"></div>
        </div>
    </div>

    <!-- 发布物品模态框 -->
    <div id="publishModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">发布物品</h3>
            </div>
            <form id="publishForm">
                <div class="form-group">
                    <label class="form-label">物品分类</label>
                    <select class="form-select" id="category" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">物品名称</label>
                    <input type="text" class="form-control" id="productName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">物品成色</label>
                    <select class="form-select" id="condition" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">价格（元）</label>
                    <input type="number" class="form-control" id="price" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">物品图片</label>
                    <input type="file" class="form-control" id="imageFile" accept="image/jpeg,image/jpg,image/png,image/gif">
                    <small style="color: #909399;">支持 JPG、PNG、GIF 格式，最大5MB</small>
                    <div id="imagePreview" style="margin-top: 10px;"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">物品描述</label>
                    <textarea class="form-control" id="description" rows="4"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-info" onclick="hideModal('publishModal')">取消</button>
                    <button type="submit" class="btn btn-primary">发布</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 编辑物品模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">编辑物品</h3>
            </div>
            <form id="editForm">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label class="form-label">物品名称</label>
                    <input type="text" class="form-control" id="editProductName" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">价格（元）</label>
                    <input type="number" class="form-control" id="editPrice" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">物品图片</label>
                    <input type="file" class="form-control" id="editImageFile" accept="image/jpeg,image/jpg,image/png,image/gif">
                    <small style="color: #909399;">支持 JPG、PNG、GIF 格式，最大5MB（不选择则保持原图）</small>
                    <div id="editImagePreview" style="margin-top: 10px;"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">物品描述</label>
                    <textarea class="form-control" id="editDescription" rows="4"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-info" onclick="hideModal('editModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        checkLogin();

        async function initPage() {
            const userInfo = getUserInfo();
            document.getElementById('username').textContent = userInfo.username;

            // 初始化选项
            const categorySelect = document.getElementById('category');
            categorySelect.innerHTML = '<option value="">请选择分类</option>' + generateCategoryOptions();

            const conditionSelect = document.getElementById('condition');
            conditionSelect.innerHTML = '<option value="">请选择成色</option>' + generateConditionOptions();

            // 添加事件监听器（只添加一次）
            if (!productActionListenerAdded) {
                document.getElementById('productList').addEventListener('click', handleProductAction);
                productActionListenerAdded = true;
            }

            await loadMyProducts();
        }

        async function loadMyProducts() {
            try {
                const response = await api.product.getMyProducts();
                if (response.code === 200) {
                    displayProducts(response.data);
                } else {
                    showError(response.message || '加载失败');
                }
            } catch (error) {
                console.error('Load products error:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        let productsData = []; // 存储产品数据

        function displayProducts(products) {
            productsData = products; // 保存数据供后续使用

            if (products.length === 0) {
                document.getElementById('productList').innerHTML = '<p style="text-align: center; color: #909399; padding: 20px;">暂无发布记录</p>';
                return;
            }

            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>物品名称</th>
                            <th>分类</th>
                            <th>成色</th>
                            <th>价格</th>
                            <th>发布时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map((product, index) => `
                            <tr>
                                <td>${product.productName}</td>
                                <td>${product.category}</td>
                                <td><span class="tag ${getConditionClass(product.condition)}">${product.condition}</span></td>
                                <td>${formatPrice(product.price)}</td>
                                <td>${formatDate(product.publishDate)}</td>
                                <td><span class="tag ${getStatusClass(product.status)}">${product.status}</span></td>
                                <td>
                                    ${product.status === '待交易' ? `
                                        <button class="btn btn-small btn-primary" data-action="edit" data-index="${index}">编辑</button>
                                        <button class="btn btn-small btn-warning" data-action="offline" data-id="${product.productId}">下架</button>
                                    ` : '-'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('productList').innerHTML = html;
        }

        // 只添加一次事件监听器
        let productActionListenerAdded = false;

        function handleProductAction(e) {
            const target = e.target;
            if (!target.matches('button[data-action]')) {
                return;
            }

            const action = target.dataset.action;

            if (action === 'edit') {
                const index = parseInt(target.dataset.index);
                const product = productsData[index];
                showEditModal(product.productId, product.productName, product.price, product.description || '', product.imageUrl || '');
            } else if (action === 'offline') {
                const productId = target.dataset.id;
                offlineProduct(productId);
            }
        }

        function showPublishModal() {
            document.getElementById('publishForm').reset();
            document.getElementById('imagePreview').innerHTML = '';
            showModal('publishModal');
        }

        // 图片预览功能
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('imagePreview');

            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showError('图片大小不能超过5MB');
                    e.target.value = '';
                    preview.innerHTML = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; max-height: 200px; border-radius: 8px;">`;
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
            }
        });

        document.getElementById('editImageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('editImagePreview');

            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showError('图片大小不能超过5MB');
                    e.target.value = '';
                    preview.innerHTML = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; max-height: 200px; border-radius: 8px;">`;
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
            }
        });

        // 上传图片到服务器
        async function uploadImage(file) {
            if (!file) return null;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/upload/image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const result = await response.json();
                if (result.code === 200) {
                    return result.data.url;
                } else {
                    showError(result.message || '图片上传失败');
                    return null;
                }
            } catch (error) {
                console.error('Upload image error:', error);
                showError('图片上传失败，请检查网络连接');
                return null;
            }
        }

        document.getElementById('publishForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 先上传图片（如果有）
            const imageFile = document.getElementById('imageFile').files[0];
            let imageUrl = null;

            if (imageFile) {
                imageUrl = await uploadImage(imageFile);
                if (imageUrl === null) {
                    return; // 图片上传失败，终止发布
                }
            }

            const productData = {
                category: document.getElementById('category').value,
                productName: document.getElementById('productName').value,
                condition: document.getElementById('condition').value,
                price: document.getElementById('price').value,
                imageUrl: imageUrl,
                description: document.getElementById('description').value
            };

            try {
                const response = await api.product.publish(productData);
                if (response.code === 200) {
                    showSuccess('发布成功！');
                    hideModal('publishModal');
                    await loadMyProducts();
                } else {
                    showError(response.message || '发布失败');
                }
            } catch (error) {
                console.error('Publish error:', error);
                showError('发布失败，请检查网络连接');
            }
        });

        function showEditModal(productId, productName, price, description, imageUrl) {
            document.getElementById('editProductId').value = productId;
            document.getElementById('editProductName').value = productName;
            document.getElementById('editPrice').value = price;
            document.getElementById('editDescription').value = description;

            // 显示现有图片
            const preview = document.getElementById('editImagePreview');
            if (imageUrl) {
                preview.innerHTML = `
                    <div style="margin-top: 10px;">
                        <p style="color: #606266; font-size: 14px;">当前图片：</p>
                        <img src="${imageUrl}" style="max-width: 200px; max-height: 200px; border-radius: 8px;"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <p style="display:none; color: #f56c6c; font-size: 12px; margin-top: 5px;">图片加载失败</p>
                    </div>
                `;
            } else {
                preview.innerHTML = '<p style="color: #909399; font-size: 14px; margin-top: 10px;">暂无图片</p>';
            }

            // 清空文件选择器
            document.getElementById('editImageFile').value = '';

            showModal('editModal');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 先上传图片（如果有新图片）
            const imageFile = document.getElementById('editImageFile').files[0];
            let imageUrl = undefined; // undefined 表示不更新图片

            if (imageFile) {
                imageUrl = await uploadImage(imageFile);
                if (imageUrl === null) {
                    return; // 图片上传失败，终止更新
                }
            }

            const productData = {
                productId: document.getElementById('editProductId').value,
                price: document.getElementById('editPrice').value,
                description: document.getElementById('editDescription').value
            };

            // 只有上传了新图片才更新 imageUrl
            if (imageUrl !== undefined) {
                productData.imageUrl = imageUrl;
            }

            try {
                const response = await api.product.update(productData);
                if (response.code === 200) {
                    showSuccess('修改成功！');
                    hideModal('editModal');
                    await loadMyProducts();
                } else {
                    showError(response.message || '修改失败');
                }
            } catch (error) {
                console.error('Update error:', error);
                showError('修改失败，请检查网络连接');
            }
        });

        async function offlineProduct(productId) {
            if (!confirm('确定要下架该物品吗？')) {
                return;
            }

            try {
                const response = await api.product.offline(productId);
                if (response.code === 200) {
                    showSuccess('下架成功！');
                    await loadMyProducts();
                } else {
                    showError(response.message || '下架失败');
                }
            } catch (error) {
                console.error('Offline error:', error);
                showError('下架失败，请检查网络连接');
            }
        }

        initPage();
    </script>
</body>
</html>
