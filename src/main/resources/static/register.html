<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">用户注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">学号</label>
                    <input type="text" class="form-control" id="studentId" required placeholder="请输入学号">
                </div>
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" required placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-control" id="confirmPassword" required placeholder="请再次输入密码">
                </div>
                <div class="form-group">
                    <label class="form-label">联系电话</label>
                    <input type="text" class="form-control" id="phone" placeholder="请输入联系电话（选填）">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">注册</button>
                <button type="button" class="btn btn-info" style="width: 100%;" onclick="location.href='login.html'">返回登录</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentId = document.getElementById('studentId').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            try {
                const response = await api.user.register({
                    studentId,
                    username,
                    password,
                    phone
                });

                if (response.code === 200) {
                    showSuccess('注册成功！');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    showError(response.message || '注册失败');
                }
            } catch (error) {
                console.error('Register error:', error);
                showError('注册失败，请检查网络连接');
            }
        });
    </script>
</body>
</html>
