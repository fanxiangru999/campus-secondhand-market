<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">校园二手物品交易平台</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">学号</label>
                    <input type="text" class="form-control" id="studentId" required placeholder="请输入学号">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">登录</button>
                <button type="button" class="btn btn-info" style="width: 100%;" onclick="location.href='register.html'">注册账号</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentId = document.getElementById('studentId').value;
            const password = document.getElementById('password').value;

            try {
                const response = await api.user.login({ studentId, password });

                if (response.code === 200) {
                    localStorage.setItem('token', response.data.token);
                    localStorage.setItem('userInfo', JSON.stringify(response.data));

                    showSuccess('登录成功！');

                    setTimeout(() => {
                        if (response.data.userType === 'admin') {
                            window.location.href = 'pages/admin/index.html';
                        } else {
                            window.location.href = 'pages/student/index.html';
                        }
                    }, 1000);
                } else {
                    showError(response.message || '登录失败');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('登录失败，请检查网络连接');
            }
        });
    </script>
</body>
</html>
