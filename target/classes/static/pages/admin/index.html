<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">管理员后台</div>
            <ul class="navbar-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="users.html">用户管理</a></li>
                <li><a href="products.html">物品管理</a></li>
                <li><a href="trades.html">交易管理</a></li>
                <li><a href="statistics.html">统计分析</a></li>
            </ul>
            <div class="navbar-user">
                <span id="username">管理员</span>
                <button class="btn btn-small btn-warning" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>系统概览</h2>
        <div class="card">
            <h3 class="card-header">用户管理</h3>
            <div id="userList"></div>
            <button class="btn btn-primary" onclick="location.href='users.html'">查看更多</button>
        </div>

        <div class="card">
            <h3 class="card-header">物品管理</h3>
            <div id="productList"></div>
            <button class="btn btn-primary" onclick="location.href='products.html'">查看更多</button>
        </div>

        <div class="card">
            <h3 class="card-header">交易管理</h3>
            <div id="tradeList"></div>
            <button class="btn btn-primary" onclick="location.href='trades.html'">查看更多</button>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        checkLogin();

        async function initPage() {
            if (!isAdmin()) {
                showError('无权限访问');
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }

            const userInfo = getUserInfo();
            document.getElementById('username').textContent = userInfo.username;

            await loadData();
        }

        async function loadData() {
            try {
                const [usersRes, productsRes, tradesRes] = await Promise.all([
                    api.user.getAllStudents(),
                    api.product.getAll(),
                    api.trade.getAll()
                ]);

                if (usersRes.code === 200) {
                    displayUsers(usersRes.data.slice(0, 5));
                }
                if (productsRes.code === 200) {
                    displayProducts(productsRes.data.slice(0, 5));
                }
                if (tradesRes.code === 200) {
                    displayTrades(tradesRes.data.slice(0, 5));
                }
            } catch (error) {
                console.error('Load data error:', error);
                showError('加载数据失败');
            }
        }

        function displayUsers(users) {
            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>学号</th>
                            <th>用户名</th>
                            <th>联系电话</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.studentId}</td>
                                <td>${user.username}</td>
                                <td>${user.phone || '未填写'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('userList').innerHTML = html;
        }

        function displayProducts(products) {
            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>物品名称</th>
                            <th>分类</th>
                            <th>价格</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map(product => `
                            <tr>
                                <td>${product.productName}</td>
                                <td>${product.category}</td>
                                <td class="${product.price >= 500 ? 'price-high' : ''}">${formatPrice(product.price)}</td>
                                <td><span class="tag ${getStatusClass(product.status)}">${product.status}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('productList').innerHTML = html;
        }

        function displayTrades(trades) {
            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>交易编号</th>
                            <th>卖家</th>
                            <th>买家</th>
                            <th>成交价格</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${trades.map(trade => `
                            <tr>
                                <td>${trade.tradeId}</td>
                                <td>${trade.sellerUsername}</td>
                                <td>${trade.buyerUsername}</td>
                                <td class="${trade.tradePrice >= 500 ? 'price-high' : ''}">${formatPrice(trade.tradePrice)}</td>
                                <td><span class="tag ${getTradeStatusClass(trade.tradeStatus)}">${trade.tradeStatus}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('tradeList').innerHTML = html;
        }

        initPage();
    </script>
</body>
</html>
