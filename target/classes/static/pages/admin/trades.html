<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易管理 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">管理员后台</div>
            <ul class="navbar-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="users.html">用户管理</a></li>
                <li><a href="products.html">物品管理</a></li>
                <li><a href="trades.html">交易管理</a></li>
                <li><a href="statistics.html">统计分析</a></li>
            </ul>
            <div class="navbar-user">
                <span id="username">管理员</span>
                <button class="btn btn-small btn-warning" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 class="card-header">交易管理</h3>
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" class="form-control" id="studentIdFilter" placeholder="学号" style="width: 150px;">
                    <input type="date" class="form-control" id="startDateFilter" style="width: 160px;">
                    <input type="date" class="form-control" id="endDateFilter" style="width: 160px;">
                    <select class="form-select" id="statusFilter" style="width: 150px;">
                        <option value="">全部状态</option>
                        <option value="待确认">待确认</option>
                        <option value="待完成">待完成</option>
                        <option value="已完成">已完成</option>
                        <option value="已拒绝">已拒绝</option>
                    </select>
                    <button class="btn btn-primary" onclick="searchTrades()">搜索</button>
                    <button class="btn btn-info" onclick="resetSearch()">重置</button>
                </div>
                <button class="btn btn-success" onclick="exportTrades()">导出Excel</button>
            </div>
            <div id="tradeList"></div>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        checkLogin();

        let allTrades = [];

        async function initPage() {
            if (!isAdmin()) {
                showError('无权限访问');
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }

            const userInfo = getUserInfo();
            document.getElementById('username').textContent = userInfo.username;

            await loadTrades();
        }

        async function loadTrades() {
            try {
                const response = await api.trade.getAll();
                if (response.code === 200) {
                    allTrades = response.data;
                    displayTrades(allTrades);
                } else {
                    showError(response.message || '加载失败');
                }
            } catch (error) {
                console.error('Load trades error:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        function displayTrades(trades) {
            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>交易编号</th>
                            <th>卖家</th>
                            <th>买家</th>
                            <th>物品名称</th>
                            <th>分类</th>
                            <th>成交价格</th>
                            <th>交易时间</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${trades.length === 0 ? '<tr><td colspan="8" style="text-align: center;">暂无交易记录</td></tr>' : ''}
                        ${trades.map(trade => `
                            <tr>
                                <td>${trade.tradeId}</td>
                                <td>${trade.sellerUsername}(${trade.sellerStudentId})</td>
                                <td>${trade.buyerUsername}(${trade.buyerStudentId})</td>
                                <td>${trade.productName}</td>
                                <td>${trade.category || '-'}</td>
                                <td class="${trade.tradePrice >= 500 ? 'price-high' : ''}">${formatPrice(trade.tradePrice)}</td>
                                <td>${formatDate(trade.tradeDate)}</td>
                                <td><span class="tag ${getTradeStatusClass(trade.tradeStatus)}">${trade.tradeStatus}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('tradeList').innerHTML = html;
        }

        function searchTrades() {
            const studentId = document.getElementById('studentIdFilter').value.toLowerCase();
            const startDate = document.getElementById('startDateFilter').value;
            const endDate = document.getElementById('endDateFilter').value;
            const status = document.getElementById('statusFilter').value;

            let filtered = allTrades;

            if (studentId) {
                filtered = filtered.filter(t =>
                    t.sellerStudentId.toLowerCase().includes(studentId) ||
                    t.buyerStudentId.toLowerCase().includes(studentId)
                );
            }
            if (startDate) {
                filtered = filtered.filter(t => new Date(t.tradeDate) >= new Date(startDate));
            }
            if (endDate) {
                filtered = filtered.filter(t => new Date(t.tradeDate) <= new Date(endDate + ' 23:59:59'));
            }
            if (status) {
                filtered = filtered.filter(t => t.tradeStatus === status);
            }

            displayTrades(filtered);
        }

        function resetSearch() {
            document.getElementById('studentIdFilter').value = '';
            document.getElementById('startDateFilter').value = '';
            document.getElementById('endDateFilter').value = '';
            document.getElementById('statusFilter').value = '';
            displayTrades(allTrades);
        }

        function exportTrades() {
            const studentId = document.getElementById('studentIdFilter').value;
            const startDate = document.getElementById('startDateFilter').value;
            const endDate = document.getElementById('endDateFilter').value;
            const status = document.getElementById('statusFilter').value;

            let filtered = allTrades;

            if (studentId) {
                filtered = filtered.filter(t =>
                    t.sellerStudentId.includes(studentId) ||
                    t.buyerStudentId.includes(studentId)
                );
            }
            if (startDate) {
                filtered = filtered.filter(t => new Date(t.tradeDate) >= new Date(startDate));
            }
            if (endDate) {
                filtered = filtered.filter(t => new Date(t.tradeDate) <= new Date(endDate + ' 23:59:59'));
            }
            if (status) {
                filtered = filtered.filter(t => t.tradeStatus === status);
            }

            if (filtered.length === 0) {
                showError('没有数据可导出');
                return;
            }

            const exportData = filtered.map(trade => ({
                '交易编号': trade.tradeId,
                '卖家学号': trade.sellerStudentId,
                '卖家姓名': trade.sellerUsername,
                '买家学号': trade.buyerStudentId,
                '买家姓名': trade.buyerUsername,
                '物品名称': trade.productName,
                '分类': trade.category || '-',
                '成交价格': trade.tradePrice,
                '交易时间': formatDate(trade.tradeDate),
                '状态': trade.tradeStatus
            }));

            exportToExcel(exportData, '交易记录_' + new Date().toLocaleDateString());
            showSuccess('导出成功！');
        }

        initPage();
    </script>
</body>
</html>
