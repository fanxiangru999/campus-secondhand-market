<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">管理员后台</div>
            <ul class="navbar-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="users.html">用户管理</a></li>
                <li><a href="products.html">物品管理</a></li>
                <li><a href="trades.html">交易管理</a></li>
                <li><a href="statistics.html">统计分析</a></li>
            </ul>
            <div class="navbar-user">
                <span id="username">管理员</span>
                <button class="btn btn-small btn-warning" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 class="card-header">用户管理</h3>
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" class="form-control" id="searchKeyword" placeholder="搜索学号或用户名" style="width: 250px;">
                    <button class="btn btn-primary" onclick="searchUsers()">搜索</button>
                </div>
            </div>
            <div id="userList"></div>
        </div>
    </div>

    <!-- 重置密码模态框 -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">重置密码</h3>
            </div>
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label">学号</label>
                    <input type="text" class="form-control" id="resetStudentId" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="resetUsername" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="text" class="form-control" id="newPassword" placeholder="请输入新密码" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-info" onclick="hideModal('resetPasswordModal')">取消</button>
                    <button type="submit" class="btn btn-primary">确认重置</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        checkLogin();

        let allUsers = [];

        async function initPage() {
            if (!isAdmin()) {
                showError('无权限访问');
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }

            const userInfo = getUserInfo();
            document.getElementById('username').textContent = userInfo.username;

            await loadUsers();
        }

        async function loadUsers() {
            try {
                const response = await api.user.getAllStudents();
                if (response.code === 200) {
                    allUsers = response.data;
                    displayUsers(allUsers);
                } else {
                    showError(response.message || '加载失败');
                }
            } catch (error) {
                console.error('Load users error:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        function displayUsers(users) {
            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>学号</th>
                            <th>用户名</th>
                            <th>联系电话</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.length === 0 ? '<tr><td colspan="5" style="text-align: center;">暂无用户</td></tr>' : ''}
                        ${users.map(user => `
                            <tr>
                                <td>${user.studentId}</td>
                                <td>${user.username}</td>
                                <td>${user.phone || '未填写'}</td>
                                <td>${formatDate(user.createdAt)}</td>
                                <td>
                                    <button class="btn btn-small btn-warning" onclick="showResetPasswordModal('${user.studentId}', '${user.username}')">重置密码</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('userList').innerHTML = html;
        }

        function searchUsers() {
            const keyword = document.getElementById('searchKeyword').value.toLowerCase();
            if (!keyword) {
                displayUsers(allUsers);
                return;
            }

            const filtered = allUsers.filter(user =>
                user.studentId.toLowerCase().includes(keyword) ||
                user.username.toLowerCase().includes(keyword)
            );
            displayUsers(filtered);
        }

        function showResetPasswordModal(studentId, username) {
            document.getElementById('resetStudentId').value = studentId;
            document.getElementById('resetUsername').value = username;
            document.getElementById('newPassword').value = '';
            showModal('resetPasswordModal');
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentId = document.getElementById('resetStudentId').value;
            const newPassword = document.getElementById('newPassword').value;

            try {
                const response = await api.user.resetPassword({
                    studentId: studentId,
                    newPassword: newPassword
                });

                if (response.code === 200) {
                    showSuccess('密码重置成功！');
                    hideModal('resetPasswordModal');
                } else {
                    showError(response.message || '重置失败');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showError('重置失败，请检查网络连接');
            }
        });

        initPage();
    </script>
</body>
</html>
