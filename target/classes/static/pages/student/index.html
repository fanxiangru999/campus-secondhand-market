<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">校园二手市场</div>
            <ul class="navbar-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="my-products.html">我的发布</a></li>
                <li><a href="my-trades.html">我的交易</a></li>
                <li><a href="profile.html">个人中心</a></li>
            </ul>
            <div class="navbar-user">
                <span id="username">加载中...</span>
                <button class="btn btn-small btn-warning" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container">
        <!-- 搜索工具栏 -->
        <div class="card">
            <div class="toolbar">
                <div class="search-box">
                    <select class="form-select" id="categoryFilter" style="width: 150px;">
                        <option value="">全部分类</option>
                    </select>
                    <input type="text" class="form-control" id="nameFilter" placeholder="搜索物品名称" style="width: 250px;">
                    <button class="btn btn-primary" onclick="searchProducts()">搜索</button>
                    <button class="btn btn-info" onclick="resetSearch()">重置</button>
                </div>
                <button class="btn btn-success" onclick="showPublishModal()">发布物品</button>
            </div>
        </div>

        <!-- 物品列表 -->
        <div id="productList" class="product-grid"></div>

        <!-- 分页 -->
        <div id="pagination" class="pagination"></div>
    </div>

    <!-- 发布物品模态框 -->
    <div id="publishModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">发布物品</h3>
            </div>
            <form id="publishForm">
                <div class="form-group">
                    <label class="form-label">物品分类</label>
                    <select class="form-select" id="category" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">物品名称</label>
                    <input type="text" class="form-control" id="productName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">物品成色</label>
                    <select class="form-select" id="condition" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">价格（元）</label>
                    <input type="number" class="form-control" id="price" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">物品图片</label>
                    <input type="file" class="form-control" id="imageFile" accept="image/jpeg,image/jpg,image/png,image/gif">
                    <small style="color: #909399;">支持 JPG、PNG、GIF 格式，最大5MB</small>
                    <div id="imagePreview" style="margin-top: 10px;"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">物品描述</label>
                    <textarea class="form-control" id="description" rows="4"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-info" onclick="hideModal('publishModal')">取消</button>
                    <button type="submit" class="btn btn-primary">发布</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 物品详情模态框 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">物品详情</h3>
            </div>
            <div id="productDetail"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-info" onclick="hideModal('detailModal')">关闭</button>
            </div>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        checkLogin();

        let currentPage = 1;
        const pageSize = 12;
        let currentCategory = '';
        let currentKeyword = '';

        // 初始化页面
        async function initPage() {
            const userInfo = getUserInfo();
            document.getElementById('username').textContent = userInfo.username;

            // 初始化分类选项
            const categoryFilter = document.getElementById('categoryFilter');
            categoryFilter.innerHTML = '<option value="">全部分类</option>' + generateCategoryOptions();

            const categorySelect = document.getElementById('category');
            categorySelect.innerHTML = '<option value="">请选择分类</option>' + generateCategoryOptions();

            const conditionSelect = document.getElementById('condition');
            conditionSelect.innerHTML = '<option value="">请选择成色</option>' + generateConditionOptions();

            await loadProducts();
        }

        // 加载物品列表
        async function loadProducts() {
            try {
                const response = await api.product.search({
                    category: currentCategory,
                    productName: currentKeyword,
                    status: '待交易',
                    pageNum: currentPage,
                    pageSize: pageSize
                });

                if (response.code === 200) {
                    displayProducts(response.data.records);
                    displayPagination(response.data.pageNum, response.data.totalPages);
                } else {
                    showError(response.message || '加载失败');
                }
            } catch (error) {
                console.error('Load products error:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        // 显示物品列表
        function displayProducts(products) {
            const productList = document.getElementById('productList');

            if (products.length === 0) {
                productList.innerHTML = '<div class="card"><p style="text-align: center; color: #909399;">暂无物品</p></div>';
                return;
            }

            productList.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image" style="background-image: url('${product.imageUrl || 'https://via.placeholder.com/300x200?text=No+Image'}')"></div>
                    <div class="product-info">
                        <div class="product-name" title="${product.productName}">${product.productName}</div>
                        <div class="product-price">${formatPrice(product.price)}</div>
                        <div class="product-desc">${product.description || '暂无描述'}</div>
                        <div class="product-footer">
                            <span class="tag ${getConditionClass(product.condition)}">${product.condition}</span>
                            <button class="btn btn-small btn-primary" onclick="viewProduct('${product.productId}')">查看详情</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 显示分页
        function displayPagination(pageNum, totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            pagination.innerHTML = generatePagination(pageNum, totalPages, 'goToPage');
        }

        // 跳转页面
        function goToPage(page) {
            currentPage = page;
            loadProducts();
        }

        // 搜索物品
        function searchProducts() {
            currentCategory = document.getElementById('categoryFilter').value;
            currentKeyword = document.getElementById('nameFilter').value;
            currentPage = 1;
            loadProducts();
        }

        // 重置搜索
        function resetSearch() {
            document.getElementById('categoryFilter').value = '';
            document.getElementById('nameFilter').value = '';
            currentCategory = '';
            currentKeyword = '';
            currentPage = 1;
            loadProducts();
        }

        // 显示发布模态框
        function showPublishModal() {
            document.getElementById('publishForm').reset();
            document.getElementById('imagePreview').innerHTML = '';
            showModal('publishModal');
        }

        // 图片预览功能
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('imagePreview');

            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showError('图片大小不能超过5MB');
                    e.target.value = '';
                    preview.innerHTML = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; max-height: 200px; border-radius: 8px;">`;
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
            }
        });

        // 上传图片到服务器
        async function uploadImage(file) {
            if (!file) return null;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/upload/image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const result = await response.json();
                if (result.code === 200) {
                    return result.data.url;
                } else {
                    showError(result.message || '图片上传失败');
                    return null;
                }
            } catch (error) {
                console.error('Upload image error:', error);
                showError('图片上传失败，请检查网络连接');
                return null;
            }
        }

        // 发布物品
        document.getElementById('publishForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 先上传图片（如果有）
            const imageFile = document.getElementById('imageFile').files[0];
            let imageUrl = null;

            if (imageFile) {
                imageUrl = await uploadImage(imageFile);
                if (imageUrl === null) {
                    return; // 图片上传失败，终止发布
                }
            }

            const productData = {
                category: document.getElementById('category').value,
                productName: document.getElementById('productName').value,
                condition: document.getElementById('condition').value,
                price: document.getElementById('price').value,
                imageUrl: imageUrl,
                description: document.getElementById('description').value
            };

            try {
                const response = await api.product.publish(productData);

                if (response.code === 200) {
                    showSuccess('发布成功！');
                    hideModal('publishModal');
                    loadProducts();
                } else {
                    showError(response.message || '发布失败');
                }
            } catch (error) {
                console.error('Publish error:', error);
                showError('发布失败，请检查网络连接');
            }
        });

        // 查看物品详情
        async function viewProduct(productId) {
            try {
                const response = await api.product.getById(productId);

                if (response.code === 200) {
                    const product = response.data;
                    const detailHtml = `
                        ${product.imageUrl ? `
                        <div class="form-group">
                            <label class="form-label">物品图片</label>
                            <img src="${product.imageUrl}" alt="${product.productName}" style="max-width: 100%; border-radius: 8px; margin-top: 10px;" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Load+Failed'">
                        </div>
                        ` : ''}
                        <div class="form-group">
                            <label class="form-label">物品名称</label>
                            <p>${product.productName}</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">分类</label>
                            <p>${product.category}</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">成色</label>
                            <p><span class="tag ${getConditionClass(product.condition)}">${product.condition}</span></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">价格</label>
                            <p class="product-price">${formatPrice(product.price)}</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述</label>
                            <p>${product.description || '暂无描述'}</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">发布者</label>
                            <p>${product.sellerUsername}</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <p>${product.sellerPhone || '未提供'}</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">发布时间</label>
                            <p>${formatDate(product.publishDate)}</p>
                        </div>
                    `;

                    document.getElementById('productDetail').innerHTML = detailHtml;
                    showModal('detailModal');
                } else {
                    showError(response.message || '加载失败');
                }
            } catch (error) {
                console.error('View product error:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        // 初始化
        initPage();
    </script>
</body>
</html>
