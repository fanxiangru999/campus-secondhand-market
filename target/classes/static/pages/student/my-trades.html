<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的交易 - 校园二手物品交易平台</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">校园二手市场</div>
            <ul class="navbar-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="my-products.html">我的发布</a></li>
                <li><a href="my-trades.html">我的交易</a></li>
                <li><a href="profile.html">个人中心</a></li>
            </ul>
            <div class="navbar-user">
                <span id="username">加载中...</span>
                <button class="btn btn-small btn-warning" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 class="card-header">我的交易记录</h3>
            <div class="toolbar">
                <div class="search-box">
                    <select class="form-select" id="roleFilter" style="width: 150px;">
                        <option value="">全部角色</option>
                        <option value="seller">我是卖家</option>
                        <option value="buyer">我是买家</option>
                    </select>
                    <select class="form-select" id="statusFilter" style="width: 150px;">
                        <option value="">全部状态</option>
                        <option value="待确认">待确认</option>
                        <option value="待完成">待完成</option>
                        <option value="已完成">已完成</option>
                        <option value="已拒绝">已拒绝</option>
                    </select>
                    <button class="btn btn-primary" onclick="filterTrades()">筛选</button>
                    <button class="btn btn-info" onclick="resetFilter()">重置</button>
                </div>
            </div>
            <div id="tradeList"></div>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        checkLogin();

        let allTrades = [];
        let currentUserId = '';

        async function initPage() {
            const userInfo = getUserInfo();
            document.getElementById('username').textContent = userInfo.username;
            currentUserId = userInfo.studentId;

            await loadMyTrades();
        }

        async function loadMyTrades() {
            try {
                const response = await api.trade.getMyTrades();
                if (response.code === 200) {
                    allTrades = response.data;
                    displayTrades(allTrades);
                } else {
                    showError(response.message || '加载失败');
                }
            } catch (error) {
                console.error('Load trades error:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        function displayTrades(trades) {
            if (trades.length === 0) {
                document.getElementById('tradeList').innerHTML = '<p style="text-align: center; color: #909399; padding: 20px;">暂无交易记录</p>';
                return;
            }

            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>交易编号</th>
                            <th>物品名称</th>
                            <th>我的角色</th>
                            <th>交易对方</th>
                            <th>成交价格</th>
                            <th>交易时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${trades.map(trade => {
                            const isSeller = trade.sellerStudentId === currentUserId;
                            const role = isSeller ? '卖家' : '买家';
                            const other = isSeller ? trade.buyerUsername : trade.sellerUsername;
                            return `
                                <tr>
                                    <td>${trade.tradeId}</td>
                                    <td>${trade.productName}</td>
                                    <td><span class="tag ${isSeller ? 'tag-success' : 'tag-info'}">${role}</span></td>
                                    <td>${other}</td>
                                    <td class="${trade.tradePrice >= 500 ? 'price-high' : ''}">${formatPrice(trade.tradePrice)}</td>
                                    <td>${formatDate(trade.tradeDate)}</td>
                                    <td><span class="tag ${getTradeStatusClass(trade.tradeStatus)}">${trade.tradeStatus}</span></td>
                                    <td>
                                        ${isSeller && trade.tradeStatus === '待确认' ? `
                                            <button class="btn btn-small btn-success" onclick="confirmTrade('${trade.tradeId}')">确认</button>
                                            <button class="btn btn-small btn-danger" onclick="rejectTrade('${trade.tradeId}')">拒绝</button>
                                        ` : ''}
                                        ${isSeller && trade.tradeStatus === '待完成' ? `
                                            <button class="btn btn-small btn-success" onclick="completeTrade('${trade.tradeId}')">标记完成</button>
                                        ` : ''}
                                        ${trade.tradeStatus === '已完成' ? '<span style="color: #67c23a;">✓ 已完成</span>' : ''}
                                        ${trade.tradeStatus === '已拒绝' ? '<span style="color: #f56c6c;">已拒绝</span>' : ''}
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('tradeList').innerHTML = html;
        }

        function filterTrades() {
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;

            let filtered = allTrades;

            if (role === 'seller') {
                filtered = filtered.filter(t => t.sellerStudentId === currentUserId);
            } else if (role === 'buyer') {
                filtered = filtered.filter(t => t.buyerStudentId === currentUserId);
            }

            if (status) {
                filtered = filtered.filter(t => t.tradeStatus === status);
            }

            displayTrades(filtered);
        }

        function resetFilter() {
            document.getElementById('roleFilter').value = '';
            document.getElementById('statusFilter').value = '';
            displayTrades(allTrades);
        }

        async function confirmTrade(tradeId) {
            if (!confirm('确定接受这个交易申请吗？')) {
                return;
            }

            try {
                const response = await api.trade.confirm(tradeId);
                if (response.code === 200) {
                    showSuccess('已确认交易！请线下完成交接后标记完成');
                    await loadMyTrades();
                } else {
                    showError(response.message || '操作失败');
                }
            } catch (error) {
                console.error('Confirm trade error:', error);
                showError('操作失败，请检查网络连接');
            }
        }

        async function rejectTrade(tradeId) {
            if (!confirm('确定拒绝这个交易申请吗？')) {
                return;
            }

            try {
                const response = await api.trade.reject(tradeId);
                if (response.code === 200) {
                    showSuccess('已拒绝交易');
                    await loadMyTrades();
                } else {
                    showError(response.message || '操作失败');
                }
            } catch (error) {
                console.error('Reject trade error:', error);
                showError('操作失败，请检查网络连接');
            }
        }

        async function completeTrade(tradeId) {
            if (!confirm('确认已完成线下交接？标记后交易将完成')) {
                return;
            }

            try {
                const response = await api.trade.complete(tradeId);
                if (response.code === 200) {
                    showSuccess('交易已完成！');
                    await loadMyTrades();
                } else {
                    showError(response.message || '操作失败');
                }
            } catch (error) {
                console.error('Complete trade error:', error);
                showError('操作失败，请检查网络连接');
            }
        }

        initPage();
    </script>
</body>
</html>
